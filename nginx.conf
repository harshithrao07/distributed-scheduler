events {
    worker_connections 1024;
}

http {
    # Use docker's embedded DNS at 127.0.0.11 so we re-resolve the `app` service
    # name as containers come and go. Keep upstreams short-TTL so a scaled-down
    # replica doesn't keep getting requests.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Round-robin across whatever IPs `app` resolves to.
    upstream scheduler_app {
        # `set $upstream` trick forces nginx to use the resolver per-request
        # rather than caching at startup (which would freeze the upstream list).
        server app:8080;
        keepalive 64;
    }

    server {
        listen 8080;

        # Health endpoint for the LB itself.
        location = /lb-health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Everything else proxies to one of the app replicas.
        location / {
            proxy_pass http://scheduler_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }
    }
}
